services:
  traefik:
    image: "traefik:v3.0"
    container_name: "traefik"
    restart: unless-stopped
    profiles:
      - infra
      - proxy
      - core
    command:
      - "--log.level=DEBUG"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.web.http.redirections.entryPoint.to=secureweb"
      - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
      - "--entryPoints.secureweb.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=your-email@example.com"
      - "--certificatesresolvers.myresolver.acme.storage=/traefik-letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik-letsencrypt:/traefik-letsencrypt"

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    profiles:
      - infra
      - management
    ports:
      - 9443:9443
    volumes:
      - portainer-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.lan`)"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "traefik.http.routers.portainer.entrypoints=web,secureweb"
      - "traefik.http.routers.portainer.tls=true"

  dashy:
    container_name: Dashy    
    image: lissy93/dashy    
    profiles:
      - infra
      - dashboard
    # Pass in your config file below, by specifying the path on your host machine    
    volumes:
       - dashy-config:/app/user-data
    ports:      
      - 4000:8080    
    # Set any environmental variables    
    environment:      
      - NODE_ENV=production    
    restart: unless-stopped    
    healthcheck:      
      test: ['CMD', 'node', '/app/services/healthcheck']      
      interval: 1m30s      
      timeout: 10s      
      retries: 3      
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashy.rule=Host(`dashy.lan`)"
      - "traefik.http.routers.dashy.entrypoints=web,secureweb"
      - "traefik.http.routers.dashy.tls=true"
      
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    # For DHCP it is recommended to remove these ports and instead add: network_mode: "host"
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      #      - "67:67/udp" # Only required if you are using Pi-hole as your DHCP server
      - "8099:80/tcp"
    environment:
      TZ: 'Europe/Amsterdam'
      # WEBPASSWORD: 'set a secure password here or it will be random'
    # Volumes store your data between container upgrades
    volumes:
      - type: bind
        source: config/network/pihole/etc-pihole
        target: /etc/pihole
      - type: bind
        source: config/network/pihole/etc-dnsmasq.d
        target: /etc/dnsmasq.d
    #   https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
    profiles:
      - infra
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=Host(`pihole.lan`)"
      - "traefik.http.routers.pihole.entrypoints=web,secureweb"
      - "traefik.http.routers.pihole.tls=true"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"

  omada:
    container_name: omada
    image: mbentley/omada-controller:latest
    profiles:
      - network
    ports:
      - 8043:8043    
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.omada.rule=Host(`omada.lan`)"
      - "traefik.http.services.omada.loadbalancer.server.port=8043"
      - "traefik.http.routers.omada.entrypoints=web,secureweb"
      - "traefik.http.routers.omada.tls=true"

# Persistent data volumes
volumes:
  dashy-config:
  proxy-manager-data:
  portainer-data:
  influxdb-data:
  mosquitto-data:
